# ====================================================================================
# nginx.conf — конфигурация для Single Page Application (React / Vue / Svelte)
# ====================================================================================
# Положи рядом с Dockerfile в корне репозитория.
#
# Ключевое: try_files $uri $uri/ /index.html
# Без этого правила React Router / Vue Router возвращает 404 при обновлении страницы.
# ====================================================================================

server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip-сжатие — ускоряет загрузку JS/CSS бандлов
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Кеширование статических ассетов (файлы с хешем в имени)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html НЕ кешируется — браузер всегда получает свежую версию
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Client-side routing: все запросы отдаём index.html
    # React Router / Vue Router сам разбирается с путём
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Скрываем версию nginx
    server_tokens off;
}
