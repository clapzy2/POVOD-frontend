# ============================================================================
# .gitlab-ci.yml - frontend (командный репозиторий)
# ============================================================================
# Назначение:
#   Подключает платформенный workflow frontend.yml и задаёт переменные,
#   специфичные для frontend-репозитория команды.
#
# Важно:
#   Сценарий деплоя frontend задаётся здесь:
#     ENABLE_FRONTEND
#
#   URL backend API также лучше фиксировать здесь, если он не является секретом.
#   Секреты в frontend-репозитории обычно не нужны.
#
# Этот файл команды НЕ редактируют без согласования с наставниками.
# Вся бизнес-логика должна находиться в React-коде и Dockerfile.
# ============================================================================

include:
  - project: "hackathon-2026/platform"
    ref: "main"
    file: "workflows/frontend.yml"

variables:
  # --------------------------------------------------------------------------
  # 1. СЕРВИС
  # --------------------------------------------------------------------------

  # Идентификатор сервиса в составе команды.
  SERVICE_NAME: "frontend"

  # Путь к docker compose файлу frontend из платформенного репозитория.
  # deploy-remote.sh использует этот файл для деплоя на удалённый хост.
  COMPOSE_FILE: ".platform/compose/frontend.yml"

  # Суффикс имени образа:
  #   <registry>/<team>/<IMAGE_NAME_SUFFIX>:<sha>
  IMAGE_NAME_SUFFIX: "frontend"

  # Путь к Dockerfile в командном репозитории.
  DOCKERFILE_PATH: "./Dockerfile"

  # --------------------------------------------------------------------------
  # 2. RUNTIME
  # --------------------------------------------------------------------------

  # Внутренний порт nginx внутри контейнера.
  # Должен совпадать с EXPOSE в Dockerfile.
  CONTAINER_PORT: "8080"

  # HTTP endpoint для healthcheck.
  # Для nginx со статикой проверяем корень сайта.
  HEALTHCHECK_PATH: "/"

  # --------------------------------------------------------------------------
  # 3. СЦЕНАРИЙ FRONTEND
  # --------------------------------------------------------------------------

  # Включение или выключение сборки и деплоя frontend:
  #   true  - frontend собирается и деплоится
  #   false - build/deploy jobs пропускаются, verify остаётся
  ENABLE_FRONTEND: "true"

  # --------------------------------------------------------------------------
  # 4. BUILD-TIME НАСТРОЙКИ
  # --------------------------------------------------------------------------

  # API_BASE_URL оставляем для документации, но в сборку не участвует
  API_BASE_URL: "https://api.team-5.hack.kam-dev.ru"

  # Платформенный build.sh читает EXTRA_BUILD_ARGS как "KEY=VALUE KEY2=VALUE2"
  # и сам подставляет --build-arg для каждой пары
  EXTRA_BUILD_ARGS: "VITE_API_URL=https://api.team-5.hack.kam-dev.ru"

# Jobs не описываем - их полностью даёт подключённый workflow frontend.yml.
